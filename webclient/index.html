<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaspanet Browser</title>
<link rel="search" type="application/opensearchdescription+xml" title="Kaspanet" href="./opensearch.xml">
<style>
  :root { --bg:#0b0e14; --panel:#11151d; --border:#222a38; --text:#d7dce2; --dim:#8b93a1; --accent:#49EACB; }
  * { box-sizing:border-box }
  body { margin:0; background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; height:100vh; display:flex; flex-direction:column }
  header { display:flex; gap:10px; align-items:center; padding:10px 14px; background:var(--panel); border-bottom:1px solid var(--border) }
  header b { white-space:nowrap; font-size:15px } header b span { color:var(--accent) }
  #addr { flex:1; background:#151a23; border:1px solid #2a3140; color:var(--text); padding:10px 14px; border-radius:8px; font-size:15px; min-width:0 }
  button { background:var(--accent); border:0; color:#06281f; padding:10px 18px; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px }
  #view { flex:1; position:relative }
  #frame { position:absolute; inset:0; width:100%; height:100%; border:0; background:#fff; display:none }
  #panel { position:absolute; inset:0; overflow:auto; padding:26px 20px }
  .inner { max-width:760px; margin:0 auto }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; margin:14px 0 }
  .warn { border-color:#8a6d1a } .err { border-color:#7a2733 }
  .dim { color:var(--dim); font-size:14px } a { color:var(--accent) }
  code { background:#151a23; padding:2px 6px; border-radius:4px; word-break:break-all }
  .dot { font-size:11px } .ok{color:var(--accent)} .bad{color:#e05561} .mid{color:#d7a021}
  h1 { font-weight:600 }
</style>
</head>
<body>
<header>
  <b id="brand" style="cursor:pointer">Kaspa<span>net</span></b>
  <input id="addr" placeholder="name.kas, example.com, or ipfs://CID" autocomplete="off" spellcheck="false">
  <button id="goBtn">Visit</button>
</header>
<div id="view">
  <iframe id="frame" sandbox="allow-scripts allow-forms" referrerpolicy="no-referrer"></iframe>
  <div id="panel"><div class="inner" id="content"></div></div>
</div>

<script src="./app.js"></script>
</body>
</html>
